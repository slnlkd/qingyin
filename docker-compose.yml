services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qingyin-backend
    restart: unless-stopped
    volumes:
      - ./backend-data:/app/backend-data
    environment:
      QINGYIN_DB_PATH: /app/backend-data/qingyin.db

  web:
    image: nginx:1.27-alpine
    container_name: qingyin-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
